<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Online Blog</title>
    <!-- Sayt taklifnomasi -->
    <meta property="og:title" content="Mening Birinchi Blogim" />
    <meta property="og:description" content="Sherlarim uchun yasayotgan blogim bilan tanishing. <<Majnuniy shoir>>" />
    <meta property="og:image" content="https://xhoopiedolojpdkhypfn.supabase.co/storage/v1/object/public/Images%20For%20MyBlog/Photo.JPG" />
    <meta property="og:url" content="https://gamer0331.github.io/" />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/png" href="https://xhoopiedolojpdkhypfn.supabase.co/storage/v1/object/public/Images%20For%20MyBlog/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <img  onclick="reload()" src="https://xhoopiedolojpdkhypfn.supabase.co/storage/v1/object/public/Images%20For%20MyBlog/logo.png" alt="Blog Logo" class="logo">
            <div class="search-box">
                <input id="search-input" type="text" placeholder="Maqola qidirish...">
                <button id="search-button">Qidirish</button>
            </div>
            <div class="nav-menu">
            <ul>
                <!-- <li><a onclick="displayPosts()">Home</a></li> -->
                 <li><a id="aut" onclick="showhideLogin()">Kirish</a></li>
                <li><a onclick="showhideAbout()">Haqida</a></li>
                <!-- <li><a onclick="displayContacts()">Contact</a></li> -->
            </ul>
            </div>
        </nav>
    </header>
    <section id="about">
        <img src="https://xhoopiedolojpdkhypfn.supabase.co/storage/v1/object/public/Images%20For%20MyBlog/Photo.JPG">
        <div class="group">
           <h1> Majnuniy Shoir </h1>
           <p> 2003-yil 1-mart </p> 
        </div>
    </section>
    <main>
        <!-- Login-SigUp Container -->

    <!-- simplified authentication container -->
    <div id="auth-container" style="display: none;">
        <h3 id="auth-title">Kirish</h3>
        
        <div class="input-group">
            <p>E-mail:</p>
            <input type="text" id="email" placeholder="E-mailni kiriting">
        </div>
        
        <div class="input-group">
            <p>Parol:</p>
            <input type="password" id="password" placeholder="Parolni kiriting">
        </div>
    
        <div id="confirm-group" style="display: none;">
            <p>Parolni tasdiqlang:</p>
            <input type="password" id="confirm-password" placeholder="Parolni qayta kiriting">
        </div>
    
        <div class="buttons">
            <button id="main-btn" onclick="handleAuth()">Kirish</button>
            <p id="toggle-text">Hisobingiz yo'qmi? <a href="#" onclick="toggleMode()">Ro'yxatdan o'tish</a></p>
        </div>
        <div class="oauth">
            <img onclick="signInWithGoogle()" src="https://www.gstatic.com/marketing-cms/assets/images/5b/b0/3a62c7b4486e943fceeeb3fe90df/g-about-gatg.png=n-w64-h65-fcrop64=1,000005f5ffffffff-rw" alt="Google orqali kirish">
        </div>
    </div>
    
    <div id="addpost">
        <div>
            <h3>Maqola joylash</h3>
            <button id="Exit" onclick="signOut()">Chiqish</button>
            <button id="Create" onclick="uploadImage()">Yaratish</button>
        </div>
        <div class="post-card" id="cpost">
            <div id="params-page">
            <div class="param">
                <label>Maqolaning ommaviyligi:</label>
                <input id="post-type" type="checkbox">
            </div>
            <div id="param">
                <label>Tasvir biriktirish:</label>
                <input id="insimage" type="checkbox" onchange="showhideinimage(this.checked)">
            </div>
            <div>
                <input class="inimage" type="file" id="fileInput" accept="image/*">
            </div>
            </div>
            <img class="inimage" src="https://xhoopiedolojpdkhypfn.supabase.co/storage/v1/object/public/Images%20For%20MyBlog/add-image.jpg" alt="Rasm yuklash" onclick="addimage()" id="post-image">
            <input type="text" placeholder="maqola sarlavhasi" id="post-header">
            <textarea oninput="autoheight(this)" placeholder="maqola matni" id="post-text"></textarea>
        </div>
    </div>

        <container class="posts" id="post-container">
            <!-- Posts will be dynamically inserted here -->
        </container>
        <container class="contacts" id="contact-container">
            <!-- Contacts will be dynamically inserted here -->
        </container>
    </main>
    <footer>
        <p>&copy; Started time: 27/02/2026 21:30</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
